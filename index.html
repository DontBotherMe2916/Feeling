<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tâm Thư 💌</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #dbeafe, #ffe4ec);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      border: 2px solid #dbeafe;
    }

    h2 {
      text-align: center;
      color: #3b82f6; /* xanh dương */
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #93c5fd;
      resize: none;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    textarea:focus {
      border-color: #ec4899; /* hồng */
      box-shadow: 0 0 8px rgba(236, 72, 153, 0.3);
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #3b82f6, #ec4899);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    .output {
      margin-top: 15px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 12px;
      min-height: 60px;
      white-space: pre-wrap;
      border-left: 4px solid #ec4899;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💌 Tâm Thư Của Bạn</h2>

  <textarea id="letter" placeholder="Viết điều bạn muốn nói..."></textarea>

  <button onclick="saveLetter()">Lưu lại 💾</button>

  <div class="output" id="output"></div>
</div>

<script>
  function saveLetter() {
    let content = document.getElementById("letter").value;

    if(content.trim() === "") {
      alert("Viết gì đó đi chứ 🥺");
      return;
    }

    localStorage.setItem("tamthu", content);
    document.getElementById("output").innerText = content;
  }

  window.onload = function() {
    let saved = localStorage.getItem("tamthu");
    if(saved) {
      document.getElementById("output").innerText = saved;
    }
  }
</script>

</body>
</html>
